################################################################################
# Render Blueprint – Guzzle Commerce (STAGING/DEV)
#
# This is for testing the backend-dev branch before merging to main.
# It creates SEPARATE services from production:
#   - guzzle-commerce-backend-staging (linked to backend-dev branch)
#   - guzzle-commerce-db-staging (test database)
#
# Usage:
#   1. Render Dashboard → New → Blueprint
#   2. Choose this file from your repo (or branch)
#   3. Render will deploy backend-dev and create a staging database
#
# Note: Uses render-staging subdomain (no custom domain needed for testing)
#
# Secrets required (set manually in dashboard after first deploy):
#   JWT_SECRET, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#   R2_BUCKET, R2_PUBLIC_URL, STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY
################################################################################

services:
  - type: web
    name: guzzle-commerce-backend-staging
    runtime: node
    region: oregon  # Match your production region
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    branch: backend-dev  # 🎯 Deploy from backend-dev branch only

    envVars:
      - key: NODE_ENV
        value: development  # Use development to see more logs for testing

      - key: PORT
        value: 5000

      # Render Postgres for STAGING
      - key: DATABASE_URL
        fromDatabase:
          name: guzzle-commerce-db-staging
          property: connectionString

      - key: DATABASE_SSL_MODE
        value: require

      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: false

      # ── Secrets – set these in the Render Dashboard ──
      - key: JWT_SECRET
        sync: false

      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET
        sync: false

      - key: R2_PUBLIC_URL
        sync: false

      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── CORS – Use Render staging domain for testing ──
      # Example: staging-frontend.onrender.com
      # For local testing during dev, use localhost:3000
      - key: FRONTEND_URL
        value: http://localhost:3000

      - key: FRONTEND_URLS
        value: http://localhost:3000,http://localhost:3001

databases:
  - name: guzzle-commerce-db-staging
    region: oregon
    plan: free  # Free tier is fine for staging/testing
    databaseName: marketplace_staging
    user: marketplace_user
